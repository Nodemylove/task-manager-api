version: '3.8'

services:
  postgres:
    image: postgres:15             # PostgreSQL version 15 — stable LTS
    container_name: taskmanager_db # name shown in Docker Desktop
    restart: always                # restart if it crashes
    environment:
      POSTGRES_USER: taskuser      # must match DB_USER in .env
      POSTGRES_PASSWORD: taskpass  # must match DB_PASS in .env
      POSTGRES_DB: taskmanager     # must match DB_NAME in .env
    ports:
      - "5432:5432"                # host:container — expose to localhost
    volumes:
      - pgdata:/var/lib/postgresql/data  # data survives container restart

volumes:
  pgdata:                          # named volume managed by Docker